name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      build_linux:
        description: 'Build for Linux'
        required: true
        default: true
        type: boolean
      build_windows:
        description: 'Build for Windows'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Application
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || inputs.build_linux == true }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux Application
        run: flutter build linux --release

      - name: Create Archive
        run: |
          cd build/linux/x64/release
          tar -czvf ../../../moamri-accounting-linux-x64.tar.gz bundle

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/moamri-accounting-linux-x64.tar.gz
          retention-days: 30

  build-windows:
    name: Build Windows Application
    runs-on: windows-latest
    if: ${{ github.event_name == 'push' || inputs.build_windows == true }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows Application
        run: flutter build windows --release

      - name: Create Archive
        run: |
          cd build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath ../../../../moamri-accounting-windows-x64.zip

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/moamri-accounting-windows-x64.zip
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: always() && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Linux Build Artifact
        if: needs.build-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: ./artifacts

      - name: Download Windows Build Artifact
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifacts

      - name: Get Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: List Artifacts
        run: ls -la ./artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: MoAmri Accounting ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## MoAmri Accounting ${{ steps.get_version.outputs.VERSION }}

            ### التغييرات في هذا الإصدار
            - تحديثات وتحسينات جديدة

            ### تحميل - Linux
            - قم بتحميل ملف `moamri-accounting-linux-x64.tar.gz`
            - فك الضغط عن الملف: `tar -xzvf moamri-accounting-linux-x64.tar.gz`
            - تشغيل الملف التنفيذي من مجلد bundle

            ### Download - Windows
            - Download `moamri-accounting-windows-x64.zip`
            - Extract the archive
            - Run `moamri_accounting.exe`

            ### System Requirements
            - Linux x64: GTK 3
            - Windows x64: Windows 10 or later

          draft: false
          prerelease: false
          files: |
            ./artifacts/moamri-accounting-linux-x64.tar.gz
            ./artifacts/moamri-accounting-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
