name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Build Release APK (arm64-only for modern devices)
        run: flutter build apk --release --target-platform android-arm64

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/moamri-accounting-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/moamri-accounting-release.apk
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build-apk
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./artifacts

      - name: Get Version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: List Artifacts
        run: ls -la ./artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: MoAmri Accounting Android ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## MoAmri Accounting Android ${{ steps.get_version.outputs.VERSION }}

            ### التغييرات في هذا الإصدار
            - تحديثات وتحسينات جديدة

            ### تحميل - Download APK
            - **Release APK**: `moamri-accounting-release.apk` - للتوزيع (موقّع)

            ### طريقة التثبيت
            1. قم بتحميل ملف APK
            2. فعّل "تثبيت من مصادر غير معروفة" في إعدادات الهاتف
            3. افتح ملف APK واضغط "تثبيت"

            ### متطلبات النظام
            - Android 5.0 (Lollipop) أو أحدث
            - معالج ARM64 (الأجهزة الحديثة)

          draft: false
          prerelease: false
          files: |
            ./artifacts/moamri-accounting-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
